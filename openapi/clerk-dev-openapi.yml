components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Your Clerk instance Secret Key (starts with sk_test_ or sk_live_)
        passed as `Authorization: Bearer YOUR_SECRET_KEY`.
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Number of results to return (1-500, default 10).
      schema:
        type: integer
        default: 10
    Offset:
      name: offset
      in: query
      required: false
      description: Number of results to skip for pagination.
      schema:
        type: integer
        default: 0
    UserId:
      name: user_id
      in: path
      required: true
      description: The ID of the user.
      schema:
        type: string
    OrganizationId:
      name: organization_id
      in: path
      required: true
      description: The ID or slug of the organization.
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      description: The ID of the session.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid Secret Key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClerkErrors'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClerkErrors'
    ValidationError:
      description: The request payload failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClerkErrors'
    TooManyRequests:
      description: Rate limit exceeded. See the Retry-After header for the cooldown in seconds.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ClerkErrors'
  schemas:
    ClerkErrors:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              long_message:
                type: string
              code:
                type: string
        clerk_trace_id:
          type: string
    DeletedObject:
      type: object
      properties:
        object:
          type: string
        id:
          type: string
        deleted:
          type: boolean
    Metadata:
      type: object
      properties:
        public_metadata:
          type: object
          additionalProperties: true
        private_metadata:
          type: object
          additionalProperties: true
        unsafe_metadata:
          type: object
          additionalProperties: true
    CreateUser:
      type: object
      properties:
        email_address:
          type: array
          items:
            type: string
        phone_number:
          type: array
          items:
            type: string
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        password:
          type: string
        skip_password_checks:
          type: boolean
        public_metadata:
          type: object
          additionalProperties: true
    User:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        username:
          type: string
          nullable: true
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        primary_email_address_id:
          type: string
          nullable: true
        banned:
          type: boolean
        locked:
          type: boolean
        two_factor_enabled:
          type: boolean
        public_metadata:
          type: object
          additionalProperties: true
        created_at:
          type: integer
        updated_at:
          type: integer
    CreateOrganization:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
        created_by:
          type: string
        max_allowed_memberships:
          type: integer
        public_metadata:
          type: object
          additionalProperties: true
    Organization:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        name:
          type: string
        slug:
          type: string
          nullable: true
        members_count:
          type: integer
        max_allowed_memberships:
          type: integer
        public_metadata:
          type: object
          additionalProperties: true
        created_at:
          type: integer
        updated_at:
          type: integer
    OrganizationMembership:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
        public_metadata:
          type: object
          additionalProperties: true
        created_at:
          type: integer
    OrganizationInvitation:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        email_address:
          type: string
        role:
          type: string
        status:
          type: string
        created_at:
          type: integer
    Session:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        user_id:
          type: string
        client_id:
          type: string
        status:
          type: string
        last_active_at:
          type: integer
        expire_at:
          type: integer
        created_at:
          type: integer
    SessionToken:
      type: object
      properties:
        object:
          type: string
        jwt:
          type: string
    Client:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        session_ids:
          type: array
          items:
            type: string
        last_active_session_id:
          type: string
          nullable: true
        created_at:
          type: integer
    SignInToken:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        user_id:
          type: string
        token:
          type: string
        status:
          type: string
    JWTTemplate:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        name:
          type: string
        claims:
          type: object
          additionalProperties: true
        lifetime:
          type: integer
        created_at:
          type: integer
    CreateJWTTemplate:
      type: object
      required: [name, claims]
      properties:
        name:
          type: string
        claims:
          type: object
          additionalProperties: true
        lifetime:
          type: integer
        allowed_clock_skew:
          type: integer
    EmailAddress:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        email_address:
          type: string
        verification:
          type: object
          nullable: true
          additionalProperties: true
    Identifier:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        identifier:
          type: string
        identifier_type:
          type: string
        created_at:
          type: integer
    Invitation:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        email_address:
          type: string
        status:
          type: string
        created_at:
          type: integer
    SAMLConnection:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        name:
          type: string
        domain:
          type: string
        active:
          type: boolean
        provider:
          type: string
        created_at:
          type: integer
    OAuthApplication:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        name:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
          nullable: true
        redirect_uris:
          type: array
          items:
            type: string
        scopes:
          type: string
        created_at:
          type: integer
