aid: clerk-dev
url: https://raw.githubusercontent.com/api-evangelist/clerk-dev/refs/heads/main/apis.yml
name: Clerk
kind: company
description: Clerk is a complete authentication and user management platform for web
  and mobile apps, providing embeddable UI components, SDKs, and REST APIs to handle
  sign-up and sign-in, users, organizations and memberships, sessions, multi-factor
  authentication, JWTs and JWT templates, JWKS, SAML/enterprise SSO, OAuth
  applications, and email/SMS verification. The Clerk Backend API (base
  https://api.clerk.com/v1, secret-key authenticated) manages these resources
  server-side, the Frontend API drives client auth flows, and change events are
  delivered as Svix-powered HTTP webhooks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Authentication
- User Management
- Identity
- Sessions
- Organizations
- SSO
- JWT
- MFA
created: '2026-07-02'
modified: '2026-07-02'
