description: >-
  FinOps view of Clerk spend. Clerk is billed primarily on monthly active users
  (MAU) rather than on API request volume - the Backend API, Frontend API, and
  Svix webhooks are included with every plan, so cost scales with how many users
  actually sign in each month, not with how chatty your integration is. The Free
  (Hobby) tier covers a monthly MAU allowance at no charge. Paid plans (Pro,
  Business) add a flat monthly platform fee plus a per-additional-MAU overage
  above the included allowance. B2B / organization features are metered
  separately on monthly active organizations (MAO), and enterprise SSO
  connections (SAML/OIDC) are billed per connection. Enterprise agreements cover
  custom MAU volume, SLAs, and HIPAA BAA.
notes: >-
  Per-unit MAU and MAO rates and allowances are not reconciled here; verify on
  https://clerk.com/pricing. The dominant cost driver is monthly active users,
  so cost management centers on understanding sign-in behavior rather than API
  call optimization.
