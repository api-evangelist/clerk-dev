meters:
- name: monthly_active_users
  description: Users who sign in during the billing month (MAU). The primary billing driver above the plan's included allowance.
  unit: users
  aggregation: max
  dimensions:
  - instance
  - plan
- name: monthly_active_organizations
  description: Organizations active during the billing month (MAO), metered for B2B / organization features.
  unit: organizations
  aggregation: max
  dimensions:
  - instance
- name: platform_fee
  description: Flat monthly plan fee for Pro / Business.
  unit: subscription
  aggregation: sum
  dimensions:
  - instance
  - plan
- name: enterprise_connections
  description: SAML / OIDC enterprise SSO connections billed per connection above the included one.
  unit: connections
  aggregation: sum
  dimensions:
  - instance
principles:
- name: Visibility
  description: Track monthly active users and monthly active organizations against the plan's included allowances; MAU, not API calls, drives the invoice.
- name: Allocation
  description: Map MAU and MAO to products or tenants using organization structure and metadata so identity cost attaches to the right cost center.
- name: Optimization
  description: Prune inactive users, avoid inflating MAU with automated / test sign-ins, and confirm whether B2B add-ons and extra enterprise connections are actually needed before enabling them.
- name: Accountability
  description: Review monthly MAU/MAO trend against plan tier thresholds and reassess Pro vs Business vs Enterprise as active users grow.
